// Convert UTC ISO string to Eastern Time (handles DST automatically)
function toEasternTime(utcStr) {
  if (!utcStr) return '--';
  try {
    const d = new Date(utcStr);
    return d.toLocaleTimeString('en-US', {
      timeZone: 'America/New_York',
      hour: 'numeric',
      minute: '2-digit',
      hour12: true
    });
  } catch(e) { return '--'; }
}

function fmt(v, d) { return v == null ? '--' : v.toFixed(d); }
function fmtPct(v) { return v == null ? '--' : (v * 100).toFixed(1) + '%'; }
function fmtOdds(v) { return v == null ? '--' : (v > 0 ? '+' + v : '' + v); }
function fmtDelta(v) {
  if (v == null) return '--';
  const s = v.toFixed(1);
  return v > 0 ? '+' + s : s;
}

function buildAllGames() {
  const rows = DATA.sort((a, b) => (b.watch || 0) - (a.watch || 0));
  const tbody = document.getElementById('tbody0');
  tbody.innerHTML = rows.map(r => `<tr>
    <td>${r.home}</td><td>${r.away}</td>
    <td class="time-col hide-mobile">${toEasternTime(r.game_time)}</td>
    <td class="num hide-mobile">${Math.round(r.home_mu)}</td>
    <td class="num hide-mobile">${Math.round(r.away_mu)}</td>
    <td class="num">${fmtPct(r.home_prob)}</td>
    <td class="num">${fmtPct(r.away_prob)}</td>
    <td class="num">${fmt(r.watch, 1)}</td>
  </tr>`).join('');
}

function buildBetting() {
  const rows = DATA.filter(r => r.has_odds)
    .sort((a, b) => (b.edge || 0) - (a.edge || 0));
  const tbody = document.getElementById('tbody1');
  tbody.innerHTML = rows.map(r => {
    const edgeCls = r.edge > 0 ? 'pos' : (r.edge < 0 ? 'neg' : 'muted');
    return `<tr>
      <td>${r.home}</td><td>${r.away}</td>
      <td class="time-col hide-mobile">${toEasternTime(r.game_time)}</td>
      <td class="num">${fmtPct(r.home_prob)}</td>
      <td class="num">${fmtPct(r.away_prob)}</td>
      <td>${r.book || '--'}</td>
      <td class="num">${fmtOdds(r.odds)}</td>
      <td class="num ${edgeCls}">${r.edge != null ? (r.edge * 100).toFixed(1) + '%' : '--'}</td>
      <td class="num hide-mobile">${r.kelly != null ? (r.kelly * 100).toFixed(1) + '%' : '--'}</td>
    </tr>`;
  }).join('');
}

function buildRankings() {
  // Populate conference dropdown (sorted alphabetically)
  const confs = [...new Set(RANKINGS.map(r => r.conf).filter(Boolean))].sort();
  const sel = document.getElementById('conf-filter');
  confs.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
  filterRankings();
}

function filterRankings() {
  const confFilter = document.getElementById('conf-filter').value;
  const filtered = RANKINGS.filter(r => !confFilter || r.conf === confFilter);
  const tbody = document.getElementById('tbody2');
  // Rank reflects overall position even when filtered
  tbody.innerHTML = filtered.map((r, filtIdx) => {
    const overallRank = RANKINGS.indexOf(r) + 1;
    const deltaCls = r.delta > 1 ? 'pos' : (r.delta < -1 ? 'neg' : 'muted');
    const record = r.games > 0 ? `${r.wins}-${r.losses}` : '--';
    return `<tr>
      <td class="num rank-num">${overallRank}</td>
      <td>${r.team}</td>
      <td class="hide-mobile">${r.conf || '--'}</td>
      <td class="num">${Math.round(r.mu)}</td>
      <td class="num hide-mobile">${Math.round(r.sigma)}</td>
      <td class="num hide-mobile">${r.tau.toFixed(4)}</td>
      <td class="num ${deltaCls}">${fmtDelta(r.delta)}</td>
      <td class="num">${record}</td>
    </tr>`;
  }).join('');
  document.getElementById('rankings-count').textContent =
    confFilter ? `${filtered.length} teams` : `${RANKINGS.length} teams`;
}

function showTab(n) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === n));
}

// Sortable columns
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const table = th.closest('table');
    const tbody = table.querySelector('tbody');
    const col = parseInt(th.dataset.col);
    const isNum = th.dataset.type === 'num';
    const rows = Array.from(tbody.querySelectorAll('tr'));
    const wasAsc = th.classList.contains('sort-asc');

    table.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
    th.classList.add(wasAsc ? 'sort-desc' : 'sort-asc');
    const dir = wasAsc ? -1 : 1;

    rows.sort((a, b) => {
      let va = a.children[col].textContent.replace('%', '').replace('+', '').trim();
      let vb = b.children[col].textContent.replace('%', '').replace('+', '').trim();
      if (va === '--') va = isNum ? '-9999' : '';
      if (vb === '--') vb = isNum ? '-9999' : '';
      if (isNum) return (parseFloat(va) - parseFloat(vb)) * dir;
      return va.localeCompare(vb) * dir;
    });
    rows.forEach(r => tbody.appendChild(r));
  });
});

buildAllGames();
buildBetting();
buildRankings();
</script>
